[background]
cycle_timeout = 150
fade_duration = 1000
fill_mode = fill_and_crop
image = /usr/share/wayfire/wallpaper.jpg
randomize = false

[dock]
autohide = true
autohide_duration = 300
css_path = 
dock_height = 100
edge_offset = 20
icon_height = 72
position = bottom

[panel]
autohide = false
autohide_duration = 300
background_color = rgba(0, 0, 0, 0.6)
battery_font = default
battery_icon_invert = false
battery_icon_size = 32
battery_status = percentage
clock_font = DejaVu Sans:style=Book 12
clock_format = %e %a %H:%M
commands_output_max_chars = 10
css_path = 
edge_offset = 20
hibernate_command = systemctl hibernate
launcher_cmd_1 = env XDG_CURRENT_DESKTOP=GNOME gnome-control-center
launcher_discord = com.discordapp.Discord.desktop
launcher_firefox = org.mozilla.firefox.desktop
launcher_gedit = org.gnome.TextEditor.desktop
launcher_icon_1 = /usr/share/icons/gnome/48x48/categories/preferences-system.png
launcher_nau = org.gnome.Nautilus.desktop
launcher_obsidian = md.obsidian.Obsidian.desktop
launcher_spotify = com.spotify.Client.desktop
launcher_steam = /usr/share/applications/steam.desktop
launcher_terminal1 = kitty.desktop
launcher_vscode = code.desktop
launchers_size = 42
launchers_spacing = 4
layer = top
logout_command = wayland-logout
menu_fuzzy_search = true
menu_icon = start-here-fedora
menu_list = false
menu_logout_command = 
menu_min_category_width = 200
menu_min_content_height = 504
menu_min_content_width = 500
menu_show_categories = true
middle_click_close = false
minimal_height = 24
network_icon_invert_color = false
network_icon_size = 32
